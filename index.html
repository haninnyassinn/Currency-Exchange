<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="converter">
    <h2>Currency Converter</h2>
    
    <input type="number" id="amount">

    <div class="select">
        <div class="from">
            <img id="flag" src="https://flagsapi.com/US/shiny/32.png">
            <select id="currency"></select>
        </div>

        <div class="conv">
            <img id="flagg" src="https://flagsapi.com/EG/shiny/32.png">
            <select id="convertedCurrency"></select>
        </div>
    </div>

    <h3 id="result"> USD = .. EGP</h3>
    <button id="convertBtn">Convert</button>
</div>




<script src="main.js"></script>
</body>
</html>
